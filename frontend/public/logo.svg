<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

  <!-- Aperture blades (9 blades - yellow) -->
  <g fill="#fcd34d" opacity="0.95">
    <!-- Blade 1 (top) -->
    <path d="M 100 20 L 65 70 L 100 60 L 135 70 Z"/>
    <!-- Blade 2 (top-right) -->
    <path d="M 130 35 L 110 90 L 125 75 L 145 55 Z"/>
    <!-- Blade 3 (right-top) -->
    <path d="M 154 70 L 130 105 L 145 95 L 160 80 Z"/>
    <!-- Blade 4 (right) -->
    <path d="M 170 100 L 140 110 L 155 100 L 140 90 Z"/>
    <!-- Blade 5 (right-bottom) -->
    <path d="M 154 130 L 160 120 L 145 105 L 130 95 Z"/>
    <!-- Blade 6 (bottom-right) -->
    <path d="M 130 165 L 145 145 L 125 125 L 110 110 Z"/>
    <!-- Blade 7 (bottom) -->
    <path d="M 100 180 L 135 130 L 100 140 L 65 130 Z"/>
    <!-- Blade 8 (bottom-left) -->
    <path d="M 70 165 L 55 145 L 75 125 L 90 110 Z"/>
    <!-- Blade 9 (left) -->
    <path d="M 30 100 L 60 90 L 45 100 L 60 110 Z"/>
    <!-- Blade 10 (left-top) -->
    <path d="M 46 70 L 55 80 L 70 95 L 70 65 Z"/>
    <!-- Blade 11 (top-left) -->
    <path d="M 70 35 L 65 55 L 75 75 L 85 45 Z"/>
  </g>

  <!-- Center sun with gradient -->
  <circle cx="100" cy="100" r="45" fill="url(#sunGlow)" opacity="0.98"/>

  <!-- Inner bright core -->
  <circle cx="100" cy="100" r="35" fill="#fbbf24" opacity="0.85"/>

  <!-- Highlight for depth -->
  <circle cx="95" cy="90" r="12" fill="#fef3c7" opacity="0.6"/>
</svg>
