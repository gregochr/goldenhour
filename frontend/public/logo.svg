<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer glow -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

  <!-- Aperture blades (9 blades like a camera aperture) -->
  <g fill="#f59e0b" opacity="0.85">
    <!-- Blade 1 (top) -->
    <polygon points="50,15 35,35 50,30 65,35"/>
    <!-- Blade 2 (top-right) -->
    <polygon points="65,23 58,38 55,32 63,28"/>
    <!-- Blade 3 (right-top) -->
    <polygon points="77,35 70,50 72,45 77,40"/>
    <!-- Blade 4 (right) -->
    <polygon points="85,50 75,48 80,50 75,52"/>
    <!-- Blade 5 (right-bottom) -->
    <polygon points="77,65 77,60 72,55 70,50"/>
    <!-- Blade 6 (bottom-right) -->
    <polygon points="63,72 63,68 58,62 55,68"/>
    <!-- Blade 7 (bottom) -->
    <polygon points="50,85 65,65 50,70 35,65"/>
    <!-- Blade 8 (bottom-left) -->
    <polygon points="37,72 42,68 42,62 37,68"/>
    <!-- Blade 9 (left) -->
    <polygon points="23,65 23,60 28,55 30,50"/>
    <!-- Blade 10 (left-top) -->
    <polygon points="23,35 28,40 30,45 23,40"/>
    <!-- Blade 11 (top-left) -->
    <polygon points="35,23 37,28 37,32 37,28"/>
  </g>

  <!-- Center sun -->
  <circle cx="50" cy="50" r="22" fill="#fbbf24" opacity="0.95"/>

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="20" fill="#fcd34d" opacity="0.7"/>
</svg>
