<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sun circle -->
  <circle cx="50" cy="50" r="30" fill="#f59e0b" opacity="0.9"/>
  <!-- Sun glow -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
  <!-- Horizon line -->
  <line x1="20" y1="70" x2="80" y2="70" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
</svg>
