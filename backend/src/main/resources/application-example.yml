anthropic:
  api-key: YOUR_ANTHROPIC_API_KEY
  model: claude-sonnet-4-5-20250929

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/goldenhour
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  mail:
    host: smtp.livemail.co.uk
    port: 587
    username: noreply@photocast.online
    password: YOUR_MAIL_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
notifications:
  schedule:
    cron: "0 30 7 * * *"
  email:
    enabled: true
    recipient: YOUR_EMAIL
  pushover:
    enabled: true
    app-token: YOUR_PUSHOVER_APP_TOKEN
    user-key: YOUR_PUSHOVER_USER_KEY
  macos-toast:
    enabled: true

cost:
  # Token-based pricing (USD per million tokens) — matches Anthropic published rates
  haiku-input-usd-per-mtok: 1.00
  haiku-output-usd-per-mtok: 5.00
  haiku-cache-write-usd-per-mtok: 1.25
  haiku-cache-read-usd-per-mtok: 0.10
  sonnet-input-usd-per-mtok: 3.00
  sonnet-output-usd-per-mtok: 15.00
  sonnet-cache-write-usd-per-mtok: 3.75
  sonnet-cache-read-usd-per-mtok: 0.30
  opus-input-usd-per-mtok: 5.00
  opus-output-usd-per-mtok: 25.00
  opus-cache-write-usd-per-mtok: 6.25
  opus-cache-read-usd-per-mtok: 0.50
  # Non-Anthropic flat costs (micro-dollars)
  world-tides-micro-dollars: 3000   # ~$0.003 per call
  open-meteo-micro-dollars: 0       # free
  # Legacy flat-rate fields (deprecated, kept for backward compatibility)
  anthropic-haiku-pence: 5
  anthropic-sonnet-pence: 13
  anthropic-opus-pence: 75
  world-tides-pence: 2
  open-meteo-pence: 0

forecast:
  locations:
    - name: Durham UK
      lat: 54.7753
      lon: -1.5849
    - name: Whitley Bay
      lat: 55.04
      lon: -1.44
    - name: Keswick
      lat: 54.6
      lon: -3.13
    - name: Ambleside
      lat: 54.43
      lon: -2.96
    - name: Dunstanburgh
      lat: 55.4894
      lon: -1.5951
  schedule:
    cron: "0 0 6,18 * * *"

jwt:
  secret: YOUR_JWT_SECRET_BASE64   # generate with: openssl rand -base64 32
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

turnstile:
  secret-key: YOUR_TURNSTILE_SECRET_KEY  # Cloudflare Turnstile

openrouteservice:
  api-key: YOUR_ORS_API_KEY  # https://openrouteservice.org — free tier: 2000 requests/day
  enabled: true              # set to false to disable drive-time refresh without removing the key

aurora:
  enabled: true
  poll-interval-minutes: 5
  light-pollution-api-key: ${LIGHT_POLLUTION_API_KEY}  # https://www.lightpollutionmap.info
  light-pollution:
    api-url: https://www.lightpollutionmap.info/api/queryraster
    query-layer: sb_2025          # Sky Brightness 2025 (replaces wa_2015 World Atlas)
    daily-limit: 1000             # quota resets at GMT+1
    delay-between-calls-ms: 500
  noaa:
    kp-url: https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json
    kp-forecast-url: https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json
    ovation-url: https://services.swpc.noaa.gov/json/ovation_aurora_latest.json
    solar-wind-url: https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json
    solar-wind-plasma-url: https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json
    alerts-url: https://services.swpc.noaa.gov/products/alerts.json
  triggers:
    kp-threshold: 5.0
    ovation-probability-threshold: 20.0
    kp-forecast-lookahead-hours: 6
    kp-clear-threshold: 5.0
    ovation-clear-threshold: 15.0
  bortle-threshold:
    moderate: 4   # max Bortle class for MODERATE alerts
    strong: 5     # max Bortle class for STRONG alerts (relax threshold for bright displays)

photocast:
  registration:
    max-users: 3             # early-access cap (excludes admin accounts)
    default-role: PRO_USER   # role assigned to new self-registered users
    enabled: true
  best-bet:
    max-tokens: 4096        # response-token ceiling for the best-bet advisor JSON.
                            # A 1024 ceiling was observed truncating a verbose two-pick
                            # response mid-field (~3656 chars), producing invalid JSON and
                            # zero persisted picks. 4096 clears a full reasoning-plus-two-picks
                            # response with headroom. Configurable without a redeploy.
    fallback-max-age-hours: 30  # age ceiling for the fail-safe stale fallback served when a
                                # cycle's advisor FAILED: a prior successful pick older than this
                                # (or whose event has passed) is NOT resurrected — the API shows
                                # the honest empty state instead. ~30h ≈ one nightly + intraday.
  batch:
    min-prefetch-success-ratio: 0.5  # abort batch if fewer than 50% of weather fetches succeed
  briefing:
    min-coverage-ratio: 0.5  # API read-path honesty: a region whose Claude-scored fraction
                             # (scoredLocationCount / roster size) is positive but below this
                             # is flagged "lightly evaluated" so the UI frames it as covering
                             # only the evaluated spots, not the whole roster. At 0.5 this is the
                             # routine far-horizon state (sparse scoring is by design). 0.0 disables.
                             # Does NOT change which locations are scored — labelling only.
  pipeline:
    safety-timeout: PT4H   # failure backstop for the batch wait phase (ISO-8601 duration).
                           # Anthropic batch latency is load-dependent: nightly (01:00 UTC) batches
                           # finish in minutes, but afternoon (~14:00 UTC, peak load) batches were
                           # observed taking up to ~3h. 4h clears the worst observed with margin
                           # while still bounding a genuinely dead cycle.
  freshness:
    settled-hours: 36              # blocking highs — once-daily refresh rhythm
    transitional-hours: 12         # half synoptic cycle — catches frontal transitions
    unsettled-hours: 4             # nowcasting window — convective evolution
    safety-floor-hours: 2          # absolute minimum to prevent rapid successive triggers
  forecast-score:
    dual-write: true               # Pass 2: dual-write component scores to forecast_score
                                   # alongside the serving path (results_json untouched). Whole-pass
                                   # rollback = set false (no redeploy); nothing reads the table yet.
  season:
    bluebell:
      start: "04-18"               # bluebell season first active day (MM-dd, inclusive).
                                   # Gates the dedicated bluebell prompt, hot topic, and DTO
                                   # surfacing. Tunable without a redeploy to track an early or
                                   # late spring.
      end: "05-18"                 # bluebell season last active day (MM-dd, inclusive)

cors:
  extra-origins: https://app.example.com,https://www.example.com  # comma-separated list

app:
  frontend-base-url: http://localhost:5173  # production: https://app.photocast.online

server:
  port: 8081

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      anthropic:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      open-meteo:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 65s
        permittedNumberOfCallsInHalfOpenState: 1
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    retryAspectOrder: 2
    instances:
      anthropic:
        maxAttempts: 4
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        exponentialMaxWaitDuration: 30s
      open-meteo:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  ratelimiter:
    rateLimiterAspectOrder: 3
    instances:
      open-meteo:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 300s
  bulkhead:
    bulkheadAspectOrder: 4
    instances:
      forecast:
        maxConcurrentCalls: 8
        maxWaitDuration: 120s
      claude:
        maxConcurrentCalls: 6
        maxWaitDuration: 120s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 30s
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
    mail:
      enabled: false
