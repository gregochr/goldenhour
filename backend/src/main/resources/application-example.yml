anthropic:
  api-key: YOUR_ANTHROPIC_API_KEY
  model: claude-sonnet-4-5-20250929

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/goldenhour
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL
    password: YOUR_APP_PASSWORD
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

notifications:
  schedule:
    cron: "0 30 7 * * *"
  email:
    enabled: true
    recipient: YOUR_EMAIL
  pushover:
    enabled: true
    app-token: YOUR_PUSHOVER_APP_TOKEN
    user-key: YOUR_PUSHOVER_USER_KEY
  macos-toast:
    enabled: true

cost:
  # API call costs in units of 1/10th pence (e.g., 0.5p = 5, 1.3p = 13)
  anthropic-haiku-pence: 5        # 0.5p per call
  anthropic-sonnet-pence: 13      # 1.3p per call
  world-tides-pence: 2            # 0.2p per call
  open-meteo-pence: 0             # free (included in subscription)

forecast:
  locations:
    - name: Durham UK
      lat: 54.7753
      lon: -1.5849
    - name: Whitley Bay
      lat: 55.04
      lon: -1.44
    - name: Keswick
      lat: 54.6
      lon: -3.13
    - name: Ambleside
      lat: 54.43
      lon: -2.96
    - name: Dunstanburgh
      lat: 55.4894
      lon: -1.5951
  schedule:
    cron: "0 0 6,18 * * *"

jwt:
  secret: YOUR_JWT_SECRET_BASE64   # generate with: openssl rand -base64 32
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

cors:
  extra-origins: https://app.example.com,https://www.example.com  # comma-separated list

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
