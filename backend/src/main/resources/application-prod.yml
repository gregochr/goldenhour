spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://goldenhour-db:5432/goldenhour
    username: goldenhour
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      # Production: validate only, never auto-migrate. Flyway handles all migrations.
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    out-of-order: true
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      anthropic:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      open-meteo:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
      open-meteo-briefing:
        registerHealthIndicator: false
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    retryAspectOrder: 2
    instances:
      anthropic:
        maxAttempts: 4
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        exponentialMaxWaitDuration: 30s
      open-meteo:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      open-meteo-briefing:
        maxAttempts: 1
  ratelimiter:
    rateLimiterAspectOrder: 3
    instances:
      open-meteo:
        limitForPeriod: 8
        limitRefreshPeriod: 1s
        timeoutDuration: 10s
  bulkhead:
    bulkheadAspectOrder: 4
    instances:
      forecast:
        maxConcurrentCalls: 8
        maxWaitDuration: 0ms

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
    mail:
      enabled: false

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-5-20250929

worldtides:
  api-key: ${WORLDTIDES_API_KEY}

openrouteservice:
  api-key: ${OPENROUTESERVICE_API_KEY}
  enabled: true

notifications:
  schedule:
    cron: "${NOTIFICATIONS_CRON:0 30 7 * * *}"
  email:
    enabled: false
    recipient: ${NOTIFICATION_EMAIL}
  pushover:
    enabled: false
  macos-toast:
    enabled: false

cost:
  # API call costs in units of 1/10th pence (e.g., 0.5p = 5, 1.3p = 13)
  anthropic-haiku-pence: 5        # 0.5p per call
  anthropic-sonnet-pence: 13      # 1.3p per call
  world-tides-pence: 2            # 0.2p per call
  open-meteo-pence: 0             # free (included in subscription)

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY}

cors:
  extra-origins: https://app.photocast.online

app:
  frontend-base-url: https://app.photocast.online

server:
  port: 8082
  servlet:
    context-path: /

