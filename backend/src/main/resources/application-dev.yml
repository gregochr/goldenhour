spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://100.76.73.16:5434/goldenhour_dev
    username: goldenhour
    password: goldenhour_dev
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    out-of-order: true
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5
worldtides:
  api-key: ${WORLDTIDES_API_KEY:}
notifications:
  email:
    enabled: false
  pushover:
    enabled: false
  macos-toast:
    enabled: false
forecast:
  schedule:
    sonnet:
      cron: "0 0 0 1 1 ?"
    haiku:
      cron: "0 0 0 1 1 ?"
    wildlife:
      cron: "0 0 0 1 1 ?"
tide:
  schedule:
    cron: "0 0 0 1 1 ?"
jwt:
  secret: bG9jYWwtZGV2LXNlY3JldC1rZXktZm9yLXRlc3Rpbmctb25seQ==
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30
turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY:}
cors:
  extra-origins: http://localhost:5173
app:
  frontend-base-url: http://localhost:5173
server:
  port: 8082
photocast:
  registration:
    max-users: 100

logging:
  level:
    root: INFO
    com.gregochr.goldenhour: DEBUG
