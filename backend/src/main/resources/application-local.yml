spring:
  datasource:
    url: jdbc:h2:file:./data/goldenhour;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
  mail:
    host: localhost
    port: 25
  jackson:
    serialization:
      write-dates-as-timestamps: false

anthropic:
  api-key: ${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY}
  model: claude-haiku-4-5

notifications:
  email:
    enabled: false
    recipient: dev@localhost
  pushover:
    enabled: false
    app-token: dev
    user-key: dev
  macos-toast:
    enabled: false

forecast:
  locations:
    - name: Durham UK
      lat: 54.7753
      lon: -1.5849
  schedule:
    cron: "0 0 6,18 * * *"

server:
  port: 8082
