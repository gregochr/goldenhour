spring:
  datasource:
    url: jdbc:h2:file:./data/goldenhour;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
  mail:
    host: localhost
    port: 25
  jackson:
    serialization:
      write-dates-as-timestamps: false

anthropic:
  api-key: ${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY}
  model: claude-haiku-4-5

worldtides:
  api-key: ${WORLDTIDES_API_KEY:}

notifications:
  email:
    enabled: false
    recipient: dev@localhost
  pushover:
    enabled: false
    app-token: dev
    user-key: dev
  macos-toast:
    enabled: false

cost:
  # API call costs in units of 1/10th pence (e.g., 0.5p = 5, 1.3p = 13)
  anthropic-haiku-pence: 5        # 0.5p per call
  anthropic-sonnet-pence: 13      # 1.3p per call
  world-tides-pence: 2            # 0.2p per call
  open-meteo-pence: 0             # free (included in subscription)

logging:
  level:
    com.gregochr.goldenhour.config.RequestLoggingInterceptor: INFO


forecast:
  locations:
    - name: Berwick-Upon-Tweed
      lat: 55.7702
      lon: -2.0054
      tideType: HIGH_TIDE
      locationType: SEASCAPE
    - name: Spittal Beach
      lat: 55.7592
      lon: -1.9912
      tideType:
        - HIGH_TIDE
        - LOW_TIDE
      locationType: SEASCAPE
    - name: Cocklawburn Beach
      lat: 55.7296
      lon: -1.9525
      goldenHourType: SUNRISE
      tideType:
        - HIGH_TIDE
        - MID_TIDE
      locationType: SEASCAPE
    - name: Angel of the North
      lat: 54.9141
      lon: -1.5895
      locationType: LANDSCAPE
      goldenHourType:
        - SUNRISE
        - SUNSET
    - name: Lowes Barns, Witton Le Wear
      lat: 54.717
      lon: -1.761
      locationType: WILDLIFE
    - name: Keswick
      lat: 54.6
      lon: -3.13
      locationType: LANDSCAPE
      goldenHourType:
        - SUNRISE
        - SUNSET
    - name: Wharton Park, Durham
      lat: 54.7806
      lon: -1.5833
      locationType: LANDSCAPE
      goldenHourType:
        - SUNRISE

  schedule:
    cron: "0 0 6,18 * * *"

jwt:
  # Local dev secret — not used in production. Generate production value with: openssl rand -base64 32
  secret: bG9jYWwtZGV2LXNlY3JldC1rZXktZm9yLXRlc3Rpbmctb25seQ==
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
