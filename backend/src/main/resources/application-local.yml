spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/goldenhour;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
anthropic:
  api-key: ${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY}
  model: claude-haiku-4-5

worldtides:
  api-key: ${WORLDTIDES_API_KEY:}

notifications:
  email:
    enabled: false
    recipient: dev@localhost
  pushover:
    enabled: false
    app-token: dev
    user-key: dev
  macos-toast:
    enabled: false

cost:
  # Token-based pricing defaults are in CostProperties — no override needed locally
  # Legacy flat-rate fields kept for backward compatibility
  anthropic-haiku-pence: 5
  anthropic-sonnet-pence: 13
  anthropic-opus-pence: 75
  world-tides-pence: 2
  open-meteo-pence: 0

logging:
  level:
    com.gregochr.goldenhour.config.RequestLoggingInterceptor: INFO


forecast:
  locations:
    - name: Berwick-Upon-Tweed
      lat: 55.7702
      lon: -2.0054
      tideType: HIGH
      locationType: SEASCAPE
    - name: Spittal Beach
      lat: 55.7592
      lon: -1.9912
      tideType:
        - HIGH
        - LOW
      locationType: SEASCAPE
    - name: Cocklawburn Beach
      lat: 55.7296
      lon: -1.9525
      solarEventType:
        - SUNRISE
      tideType:
        - HIGH
        - MID
      locationType: SEASCAPE
    - name: Angel of the North
      lat: 54.9141
      lon: -1.5895
      locationType: LANDSCAPE
      solarEventType:
        - SUNRISE
        - SUNSET
    - name: Lowes Barns, Witton Le Wear
      lat: 54.717
      lon: -1.761
      locationType: WILDLIFE
    - name: Keswick
      lat: 54.6
      lon: -3.13
      locationType: LANDSCAPE
      solarEventType:
        - SUNRISE
        - SUNSET
    - name: Wharton Park, Durham
      lat: 54.7806
      lon: -1.5833
      locationType: LANDSCAPE
      solarEventType:
        - SUNRISE

  schedule:
    cron: "0 0 6,18 * * *"

jwt:
  # Local dev secret — not used in production. Generate production value with: openssl rand -base64 32
  secret: bG9jYWwtZGV2LXNlY3JldC1rZXktZm9yLXRlc3Rpbmctb25seQ==
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY:}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
