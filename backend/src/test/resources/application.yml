spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 25
anthropic:
  api-key: test-key
  model: claude-sonnet-4-5-20250929

notifications:
  email:
    enabled: false
    recipient: test@example.com
  pushover:
    enabled: false
    app-token: test
    user-key: test
  macos-toast:
    enabled: false

forecast:
  locations:
    - name: Durham UK
      lat: 54.7753
      lon: -1.5849
  schedule:
    cron: "0 0 6,18 * * *"

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktMzI=
  access-token-expiry-hours: 24
  refresh-token-expiry-days: 30

server:
  port: 8081

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      anthropic:
        registerHealthIndicator: false
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
      open-meteo:
        registerHealthIndicator: false
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
  retry:
    retryAspectOrder: 2
    instances:
      anthropic:
        maxAttempts: 4
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        exponentialMaxWaitDuration: 30s
      open-meteo:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  ratelimiter:
    rateLimiterAspectOrder: 3
    instances:
      open-meteo:
        limitForPeriod: 8
        limitRefreshPeriod: 1s
        timeoutDuration: 10s
  bulkhead:
    bulkheadAspectOrder: 4
    instances:
      forecast:
        maxConcurrentCalls: 8
        maxWaitDuration: 0ms
