name: Dependabot auto-merge

# Auto-approves and enables auto-merge for Dependabot PRs that are minor or
# patch bumps. GitHub's native auto-merge waits for the required status checks
# (the CI workflow's Backend and Frontend jobs) to pass before merging, so this
# never merges a red PR. Major-version bumps are deliberately left for manual
# review.
#
# Requirements on the repository (Settings):
#   - "Allow auto-merge" enabled (Settings → General → Pull Requests).
#   - Branch protection on `main` with the CI checks marked as required, so
#     `--auto` actually gates on them.

on: pull_request

# Dependabot-triggered runs get a read-only token by default; grant just what
# the approve + enable-auto-merge steps need.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve the PR
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
