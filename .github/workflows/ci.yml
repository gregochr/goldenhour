name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Tests use H2 in-memory (src/test/resources/application.yml) — no external DB needed.
      # mvn verify also runs JaCoCo and enforces the 80% line coverage minimum.
      - name: Build, test, and verify coverage
        run: |
          chmod +x backend/mvnw
          cd backend && ./mvnw clean verify --batch-mode --no-transfer-progress

      - name: Security static analysis (FindSecBugs)
        run: |
          cd backend && ./mvnw compile spotbugs:check --batch-mode --no-transfer-progress

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml

      - name: OWASP Dependency-Check (backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          cd backend && ./mvnw org.owasp:dependency-check-maven:12.2.1:check --batch-mode --no-transfer-progress -DossindexAnalyzerEnabled=false

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-backend-report
          path: backend/target/dependency-check-report.*

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Unit tests (Vitest)
        run: cd frontend && npm test

      - name: OWASP Dependency Audit (frontend)
        run: cd frontend && npm audit --audit-level=high

      - name: Build
        run: cd frontend && npm run build

  # ── Playwright E2E ───────────────────────────────────────────────────────────
  # E2E tests require a live Spring Boot backend (Open-Meteo + Claude + DB).
  # They run against a real environment rather than in the standard CI pipeline.
  # To run locally: cd frontend && npm run test:e2e
