name: CodeQL Security Analysis

on:
  schedule:
    - cron: '0 2 * * MON'  # 2am UTC every Monday (before ZAP at 4am, PIT at 6am)
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: self-hosted
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, java-kotlin
          queries: security-and-quality

      - name: Build backend
        run: |
          cd backend && chmod +x mvnw && ./mvnw compile -DskipTests --batch-mode --no-transfer-progress

      - name: Perform CodeQL Analysis (Java/Kotlin)
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

      - name: Perform CodeQL Analysis (JavaScript/TypeScript)
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
