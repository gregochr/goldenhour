name: Deploy
on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push Docker Images
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/gregochr/goldenhour-backend:latest
            ghcr.io/gregochr/goldenhour-backend:${{ steps.tag.outputs.VERSION }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_TURNSTILE_SITE_KEY=0x4AAAAAACkZr4aO-Px_Wy6t
          tags: |
            ghcr.io/gregochr/goldenhour-frontend:latest
            ghcr.io/gregochr/goldenhour-frontend:${{ steps.tag.outputs.VERSION }}

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.76.73.16
          username: gregochr
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/goldenhour
            docker compose pull goldenhour-backend goldenhour-frontend
            docker compose up -d --no-deps goldenhour-backend goldenhour-frontend
            sleep 30
            docker compose ps
