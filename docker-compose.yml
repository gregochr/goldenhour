version: '3.9'

services:
  goldenhour-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: gregochr/goldenhour:latest
    container_name: goldenhour-backend
    ports:
      - "8082:8082"
    volumes:
      - /Users/gregochr/goldenhour-data:/data
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      WORLDTIDES_API_KEY: ${WORLDTIDES_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/goldenhour;MODE=MySQL
      SPRING_PROFILES_ACTIVE: prod
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
