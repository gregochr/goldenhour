services:
  goldenhour-db:
    image: postgres:17-alpine
    container_name: goldenhour-db
    environment:
      POSTGRES_DB: goldenhour
      POSTGRES_USER: goldenhour
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /Users/gregochr/goldenhour-data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldenhour"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  goldenhour-frontend:
    image: ghcr.io/gregochr/goldenhour-frontend:latest
    container_name: goldenhour-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - goldenhour-backend
    restart: always

  goldenhour-backend:
    image: ghcr.io/gregochr/goldenhour-backend:latest
    container_name: goldenhour-backend
    ports:
      - "8082:8082"
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://goldenhour-db:5432/goldenhour
      SPRING_DATASOURCE_USERNAME: goldenhour
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >-
        -Djdk.virtualThreadScheduler.maxPoolSize=256
        -Djdk.tracePinnedThreads=short
    volumes:
      - /Users/gregochr/goldenhour-data/logs:/app/logs
    depends_on:
      goldenhour-db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
