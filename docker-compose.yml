services:
  goldenhour-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_TURNSTILE_SITE_KEY: "0x4AAAAAACkZr4aO-Px_Wy6t"
    image: gregochr/goldenhour-frontend:latest
    container_name: goldenhour-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - goldenhour-backend
    restart: always

  goldenhour-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goldenhour-backend
    ports:
      - "8082:8082"
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/goldenhour
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - /Users/gregochr/goldenhour-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
