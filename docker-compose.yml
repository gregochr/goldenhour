version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: goldenhour
      POSTGRES_USER: sunset
      POSTGRES_PASSWORD: sunset
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - postgres

volumes:
  postgres_data:
  grafana_data:
